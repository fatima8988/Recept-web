<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>SweetBites</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">SweetBites</a>

  <nav id="navLinks">
    <a href="index.html" class="active">Hem</a>
    <a href="mat.html">Mat</a>
    <a href="dessert.html">Dessert</a>
    <a href="kontakt.html">Kontakt</a>
  </nav>

  <button class="nav-btn">Logga in</button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>
      Upptäck goda recept<br>
      varje dag
    </h1>
    <p>
      Hitta inspiration för mat och dessert på ett enkelt och snyggt sätt
    </p>
  </div>

  <div class="hero-img">
    <img id="heroImage" src="p.png" alt="">
  </div>
</section>

<!-- SEARCH + API -->
<section class="recipes">
  <h2>Hitta recept</h2>

  <input 
    type="text" 
    id="search" 
    placeholder="Sök recept..." 
    class="search"
  >

  <div class="cards" id="recipesContainer"></div>
</section>

<!-- 🔐 LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h2>Logga in</h2>

    <input type="text" id="username" placeholder="Användarnamn">
    <input type="password" id="password" placeholder="Lösenord">

    <button id="loginSubmit">Logga in</button>
  </div>
</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
