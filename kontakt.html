<header class="nav">

  <nav id="navLinks">

  </nav>

  <button class="nav-btn">Logga in</button>

<section class="contact">
  <div class="contact-container">

    <h1>Kontakta oss 💌</h1>
    <p>Har du frågor, feedback eller förslag? Hör gärna av dig!</p>

    <form class="contact-form">
      <input type="text" placeholder="Ditt namn" required>
      <input type="email" placeholder="Din email" required>
      <textarea placeholder="Skriv ditt meddelande..." rows="5" required></textarea>
      <button type="submit">Skicka</button>
    </form>

    <div class="contact-info">
      <p>📧 Email: sweetbites@email.com</p>
      <p>📍 Stockholm, Sverige</p>
    </div>

  </div>
</section>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>

</body>
