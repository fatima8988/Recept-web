<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Kontakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">SweetBites</a>

  <nav id="navLinks">
    <a href="index.html">Hem</a>
    <a href="mat.html">Mat</a>
    <a href="dessert.html">Dessert</a>
    <a href="kontakt.html" class="active">Kontakt</a>
  </nav>

  <button class="nav-btn">Logga in</button>
</header>

<section class="contact">
  <div class="contact-container">

    <h1>Kontakta oss 💌</h1>
    <p>Har du frågor, feedback eller förslag? Hör gärna av dig!</p>

    <form class="contact-form">

      <input type="text" placeholder="Ditt namn" required>
      <input type="email" placeholder="Din email" required>

      <textarea placeholder="Skriv ditt meddelande..." rows="5" required></textarea>

      <button type="submit">Skicka</button>

    </form>

    <div class="contact-info">
      <p>📧 Email: sweetbites@email.com</p>
      <p>📍 Stockholm, Sverige</p>
    </div>

  </div>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h2>Logga in</h2>
    <input type="text" id="username" placeholder="Användarnamn">
    <input type="password" id="password" placeholder="Lösenord">
    <button id="loginSubmit">Logga in</button>
  </div>
</div>

<script src="auth.js"></script>

</body>
</html>
