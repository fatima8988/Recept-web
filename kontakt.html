<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <a href="index.html" class="logo">SweetBites</a>

  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="mat.html">Food</a>
    <a href="dessert.html">Dessert</a>
    <a href="kontakt.html" class="active">Contact</a>
  </nav>

  <button class="nav-btn">Log out</button>
</header>

<section class="contact">
  <div class="contact-container">

    <h1>Contact us 💌</h1>
    <p>Do you have any questions, feedback, or suggestions? Feel free to reach out!</p>

<form class="contact-form" onsubmit="sendMail(event)">
  <input type="text" id="name" placeholder="Your name" required>
  <input type="email" id="email" placeholder="Your email" required>
  <textarea id="message" placeholder="Your message..." rows="5" required></textarea>
  <button type="submit">Send</button>
</form>

    <div class="contact-info">
      <p>📧 Email: sweetbites@email.com</p>
      <p>📍 Stockholm, Sverige</p>
    </div>

  </div>
</section>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>
<script>
function sendMail(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const subject = encodeURIComponent("Message from SweetBites");
  const body = encodeURIComponent(
    `Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`
  );

  // 👉 CHANGE THIS EMAIL
  window.location.href = `mailto:fatima.chohan@elev.ga.lbs.se?subject=${subject}&body=${body}`;
}
</script>
</body>
</html>
