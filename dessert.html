<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>SweetBites Bakery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV -->
<header class="nav">
  <h2 class="logo">SweetBites</h2>

  <nav>
    <a href="#">Hem</a>
    <a href="#">Dessert</a>
    <a href="#">Om oss</a>
    <a href="#">Kontakt</a>
  </nav>

  <div class="menu-icon">☰</div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Bakery</h1>
    <p>Upptäck de bästa desserterna och bakverken varje dag.</p>
    <button>Beställ nu</button>
  </div>
</section>

<!-- DOTS -->
<div class="dots">
  <span class="active"></span>
  <span></span>
  <span></span>
</div>

<!-- CARDS -->
<section class="desserts">
  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
      <h3>Vaniljkaka</h3>
      <p>Mjuk och luftig</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb">
      <h3>Chokladkaka</h3>
      <p>Rik och krämig</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52">
      <h3>Cheesecake</h3>
      <p>Perfekt dessert</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605478571513-0a1c1c7d6f6c">
      <h3>Munkar</h3>
      <p>Söta och fluffiga</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
      <h3>Hallonkaka</h3>
      <p>Fräsch och god</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">
      <h3>Chocolate Dream</h3>
      <p>Lyxig dessert</p>
    </div>

  </div>
</section>

</body>
</html>
