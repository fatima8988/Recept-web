<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Recept</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV -->
<header class="nav">
  <a href="index.html" class="logo">SweetBites</a>

  <nav id="navLinks">
    <a href="index.html">Home</a>
    <a href="mat.html">Food</a>
    <a href="dessert.html">Dessert</a>
  </nav>

  <button class="nav-btn">Log out</button>
</header>

<!-- PAGE -->
<section class="recipe-page">
  <div id="recipeContainer"></div>
</section>

<script>
// ======================
// NAV: SHOW "SAVED" WHEN LOGGED IN
// ======================

function updateSavedLink() {
  const nav = document.getElementById("navLinks");
  if (!nav) return;

  const logged = localStorage.getItem("loggedIn") === "true";
  const existing = document.getElementById("savedLink");

  if (logged && !existing) {
    const saved = document.createElement("a");
    saved.href = "saved.html";
    saved.id = "savedLink";
    saved.innerText = "Saved ❤️";
    nav.appendChild(saved);
  }

  if (!logged && existing) {
    existing.remove();
  }
}

updateSavedLink();
window.addEventListener("focus", updateSavedLink);


// ======================
// RECIPE PAGE LOGIC
// ======================

const container = document.getElementById("recipeContainer");
const recipe = JSON.parse(localStorage.getItem("selectedRecipe"));

if (!recipe) {
  container.innerHTML = "<p>No recipe found</p>";
} else {

  // INGREDIENTS
  let ingredients = "";

  for (let i = 1; i <= 20; i++) {
    const ing = recipe["strIngredient" + i];
    const mea = recipe["strMeasure" + i];

    if (ing && ing.trim() !== "") {
      ingredients += `
        <label class="ingredient">
          <input type="checkbox">
          <span>${mea || ""} ${ing}</span>
        </label>
      `;
    }
  }

  // STEPS
  const steps = (recipe.strInstructions || "")
    .split(/\.\s+/)
    .filter(step => step.trim() !== "");

  let stepsHTML = "";

  steps.forEach(step => {
    let clean = step.replace(/^\d+$/, "");
    clean = clean.replace(/^\d+\.\s*/, "");

    if (clean.trim() === "") return;

    stepsHTML += `<li>${clean}</li>`;
  });

  // RENDER
  container.innerHTML = `
    <div class="recipe-layout">

      <!-- TOP -->
      <div class="recipe-top">

        <div class="recipe-info">
          <h1>${recipe.strMeal}</h1>

          <p class="recipe-desc">
            ${recipe.strMeal} is a ${recipe.strCategory?.toLowerCase() || "delicious"} dish from ${recipe.strArea || "various cuisines"}, known for its rich flavors and ingredients.
          </p>

          <button id="favBtn" class="fav-big">❤️ Save</button>
        </div>

        <div class="recipe-image">
          <img src="${recipe.strMealThumb}" alt="${recipe.strMeal}">
        </div>

      </div>

      <!-- BOTTOM -->
      <div class="recipe-bottom">

        <div class="steps-box">
          <h3>Instructions</h3>
          <ul class="instructions">
            ${stepsHTML}
          </ul>
        </div>

        <div class="ingredients-box">
          <h3>Ingredients</h3>
          ${ingredients}
        </div>

      </div>

    </div>
  `;

  // FAVORITES (login protected)
  let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
  const favBtn = document.getElementById("favBtn");

  if (favorites.includes(recipe.idMeal)) {
    favBtn.innerText = "❤️ saved";
  }

  favBtn.addEventListener("click", () => {

    if (localStorage.getItem("loggedIn") !== "true") {
      alert("Log in to save ❤️");
      return;
    }

    if (!favorites.includes(recipe.idMeal)) {
      favorites.push(recipe.idMeal);
      favBtn.innerText = "❤️ saved";
    } else {
      favorites = favorites.filter(id => id !== recipe.idMeal);
      favBtn.innerText = "❤️ save";
    }

    localStorage.setItem("favorites", JSON.stringify(favorites));
  });
}


// ======================
// NAV SCROLL EFFECT
// ======================

const navbar = document.querySelector(".nav");

window.addEventListener("scroll", () => {
  if (!navbar) return;

  if (window.scrollY > 50) {
    navbar.classList.add("scrolled");
  } else {
    navbar.classList.remove("scrolled");
  }
});
</script>

<!-- FIREBASE -->
<script type="module" src="firebase.js"></script>

</body>
</html>
